name: Build and release packages (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label for the image build and package builds (the release/orchestration jobs always run on ubuntu-latest)"
        required: false
        type: string
        default: ubuntu-latest
      packages_file:
        description: >-
          Path (relative to the repo root) of a YAML file listing the packages
          to build. Each entry has package_repo and package_name, plus optional
          skip_tests and pgp_keys.
        required: false
        type: string
        default: .github/packages.yml
      repo_db_name:
        description: "Base name of the published repo (creates <name>.db.tar.gz and <name>.gpg)"
        required: true
        type: string
    secrets:
      # Callers in a different org/enterprise cannot use `secrets: inherit`; they
      # must pass GPG_PRIVATE_KEY explicitly.
      GPG_PRIVATE_KEY:
        description: "GPG private key for signing packages"
        required: true

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and cache Docker image
        uses: tehrengruber/arch-pre-built-packages/.github/actions/archlinux-docker@v0.1
        with:
          run: "true"

  create-temp-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Create temporary release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          DEFAULT_BRANCH=$(gh api "repos/$REPO" --jq .default_branch)
          if [ "$EVENT_NAME" = "pull_request" ]; then
            FINAL_TAG="pr$PR_NUMBER"
            TARGET="$PR_HEAD_SHA"
            CURRENT=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .head.sha)
          elif { [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; } \
               && [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            FINAL_TAG="latest"
            TARGET="$SHA"
            CURRENT=$(gh api "repos/$REPO/branches/$REF_NAME" --jq .commit.sha)
          else
            echo "Event '$EVENT_NAME' on ref '$REF_NAME' — no release will be created"
            exit 0
          fi
          if [ "$TARGET" != "$CURRENT" ]; then
            echo "Triggering SHA $TARGET is no longer head ($CURRENT) — stale re-run, skipping release"
            exit 0
          fi
          TEMP_TAG="pending-$FINAL_TAG-$RUN_ID"
          gh release create "$TEMP_TAG" \
            --repo "$REPO" \
            --target "$TARGET" \
            --title "Packages $FINAL_TAG (pending)" \
            --notes "Pending build from $TARGET" \
            --draft
          echo "tag=$TEMP_TAG" >> "$GITHUB_OUTPUT"

  prepare-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.parse.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Convert package list to JSON
        id: parse
        env:
          PACKAGES_FILE: ${{ inputs.packages_file }}
        run: |
          PACKAGES=$(yq -o=json -I=0 '.' "$PACKAGES_FILE")
          if [ -z "$PACKAGES" ] || [ "$PACKAGES" = "null" ]; then
            echo "No packages found in $PACKAGES_FILE" >&2
            exit 1
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

  build-packages:
    needs: [build-image, create-temp-release, prepare-packages]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-packages.outputs.packages) }}
    # Full path + ref (not ./): a relative ref in a reusable workflow resolves
    # against the repo that started the run, so cross-repo callers would not
    # find it. Keep this pinned to the same tag as the action refs.
    uses: tehrengruber/arch-pre-built-packages/.github/workflows/build-package.yml@v0.1
    with:
      runner: ${{ inputs.runner }}
      package_repo: ${{ matrix.package_repo }}
      package_name: ${{ matrix.package_name }}
      release_tag: ${{ needs.create-temp-release.outputs.tag }}
      pgp_keys: ${{ matrix.pgp_keys }}
      skip_tests: ${{ matrix.skip_tests }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  deploy-site:
    needs: [create-temp-release, build-image, build-packages]
    if: needs.create-temp-release.outputs.tag != ''
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: pkg-*
          path: packages
          merge-multiple: true

      - name: Initial setup
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          (umask 077; echo "$GPG_KEY" > /tmp/gpg-private.key)
          mkdir -p site packages

      - name: Build pacman repo database and export GPG public key
        uses: tehrengruber/arch-pre-built-packages/.github/actions/archlinux-docker@v0.1
        with:
          mount: |
            ${{ github.workspace }}/packages:/packages:ro
            ${{ github.workspace }}/site:/site
            /tmp/gpg-private.key:/tmp/gpg-private.key:ro
          run: |
            mkdir -p /site
            REPO_DB_NAME='${{ inputs.repo_db_name }}'
            gpg --batch --import /tmp/gpg-private.key
            gpg --export --armor > "/site/$REPO_DB_NAME.gpg"
            find /packages -maxdepth 1 -name "*.pkg.tar.*" \! -name "*.sig" -exec repo-add --sign "/site/$REPO_DB_NAME.db.tar.gz" {} +

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-temp-release.outputs.tag }}" site/* \
            --repo "${{ github.repository }}"

      - name: Remove GPG key
        if: always()
        run: rm -f /tmp/gpg-private.key