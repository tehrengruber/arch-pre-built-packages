name: Build and release packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-image:
    runs-on: &runner ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and cache Docker image
        uses: ./.github/actions/archlinux-docker
        with:
          run: "true"

  create-temp-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Create temporary release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            FINAL_TAG="pr$PR_NUMBER"
            TARGET="$PR_HEAD_SHA"
            CURRENT=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .head.sha)
          elif { [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; } \
               && { [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "master" ]; }; then
            FINAL_TAG="latest"
            TARGET="$SHA"
            CURRENT=$(gh api "repos/$REPO/branches/$REF_NAME" --jq .commit.sha)
          else
            echo "Event '$EVENT_NAME' on ref '$REF_NAME' — no release will be created"
            exit 0
          fi
          if [ "$TARGET" != "$CURRENT" ]; then
            echo "Triggering SHA $TARGET is no longer head ($CURRENT) — stale re-run, skipping release"
            exit 0
          fi
          TEMP_TAG="pending-$FINAL_TAG-$RUN_ID"
          gh release create "$TEMP_TAG" \
            --repo "$REPO" \
            --target "$TARGET" \
            --title "Packages $FINAL_TAG (pending)" \
            --notes "Pending build from $TARGET" \
            --draft
          echo "tag=$TEMP_TAG" >> "$GITHUB_OUTPUT"

  build-packages:
    needs: [build-image, create-temp-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_repo: https://aur.archlinux.org/gcc13.git
            package_name: gcc13
            skip_tests: "true"
          - package_repo: https://aur.archlinux.org/gcc14.git
            package_name: gcc14
            skip_tests: "true"
          - package_repo: https://aur.archlinux.org/python310.git
            package_name: python310
          - package_repo: https://aur.archlinux.org/python311.git
            package_name: python311
          - package_repo: https://aur.archlinux.org/python312.git
            package_name: python312
          - package_repo: https://aur.archlinux.org/python313.git
            package_name: python313
          - package_repo: https://aur.archlinux.org/yay.git
            package_name: yay
          - package_repo: https://aur.archlinux.org/claude-code.git
            package_name: claude-code
    uses: ./.github/workflows/build-package.yml
    with:
      runner: *runner
      package_repo: ${{ matrix.package_repo }}
      package_name: ${{ matrix.package_name }}
      release_tag: ${{ needs.create-temp-release.outputs.tag }}
      pgp_keys: ${{ matrix.pgp_keys }}
      skip_tests: ${{ matrix.skip_tests }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  deploy-site:
    needs: [create-temp-release, build-image, build-packages]
    if: needs.create-temp-release.outputs.tag != ''
    runs-on: *runner
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: pkg-*
          path: packages
          merge-multiple: true

      - name: Initial setup
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_KEY" > /tmp/gpg-private.key
          mkdir -p site packages

      - name: Build pacman repo database and export GPG public key
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/packages:/packages:ro
            ${{ github.workspace }}/site:/site
            /tmp/gpg-private.key:/tmp/gpg-private.key:ro
          run: |
            gpg --batch --import /tmp/gpg-private.key
            mkdir -p /site
            gpg --export --armor > /site/arch-pre-built.gpg
            find /packages -maxdepth 1 -name "*.pkg.tar.*" \! -name "*.sig" -exec repo-add --sign /site/arch-pre-built.db.tar.gz {} +

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-temp-release.outputs.tag }}" site/* \
            --repo "${{ github.repository }}"