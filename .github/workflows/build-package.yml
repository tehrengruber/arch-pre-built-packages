name: Build Arch Linux ARM package

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub runner label"
        required: true
        type: string
      package_repo:
        description: "Git URL of the package repo containing the PKGBUILD"
        required: true
        type: string
      package_name:
        description: "Name of the package"
        required: true
        type: string
      release_tag:
        description: "Release tag to upload the package to"
        required: false
        type: string
      pgp_keys:
        description: "Space-separated PGP key IDs to import before building"
        required: false
        type: string
      skip_tests:
        description: "Skip the check() phase of makepkg ('true' to skip)"
        required: false
        type: string
        default: ""
    secrets:
      GPG_PRIVATE_KEY:
        description: "GPG private key for signing packages"
        required: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write GPG key
        run: |
          if [ -n "$GPG_KEY" ]; then
            echo "$GPG_KEY" > /tmp/gpg-private.key
          else
            touch /tmp/gpg-private.key
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Fetch previous artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          PKG: ${{ inputs.package_name }}
          REPO: ${{ github.repository }}
          TEMP_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p prev pkg
          if [ -n "$TEMP_TAG" ]; then
            WITHOUT_PREFIX="${TEMP_TAG#pending-}"
            FINAL_TAG="${WITHOUT_PREFIX%-*}"
          else
            FINAL_TAG="latest"
          fi
          TAGS=$(gh release list --repo "$REPO" --json tagName,createdAt \
            | jq -r --arg ft "$FINAL_TAG" \
              '[.[] | select(.tagName == $ft or (.tagName | startswith("pending-" + $ft + "-")))] | sort_by(.createdAt) | reverse | .[].tagName')
          for TAG in $TAGS; do
            gh release download "$TAG" --repo "$REPO" --dir prev \
              --pattern "${PKG}.aur-hash" \
              --pattern "${PKG}-*.pkg.tar.*" 2>/dev/null || true
            if [ -f "prev/${PKG}.aur-hash" ] && ls prev/${PKG}-*.pkg.tar.* >/dev/null 2>&1; then
              echo "Found previous artifacts in $TAG"
              break
            fi
            rm -f prev/${PKG}.aur-hash prev/${PKG}-*.pkg.tar.* 2>/dev/null || true
          done

      - name: Build (or reuse) package
        uses: ./.github/actions/archlinux-docker
        with:
          mount: |
            ${{ github.workspace }}/pkg:/pkg
            ${{ github.workspace }}/prev:/prev:ro
            /tmp/gpg-private.key:/tmp/gpg-private.key:ro
          run: |
            git config --file /etc/makepkg.d/gitconfig user.email "till@ehrengruber.ch"
            git config --file /etc/makepkg.d/gitconfig user.name "Till Ehrengruber"
            if [ -f /tmp/gpg-private.key ]; then
              gpg --batch --import /tmp/gpg-private.key
            fi
            if [ -n "${{ inputs.pgp_keys }}" ]; then
              gpg --recv-keys ${{ inputs.pgp_keys }}
            fi

            git clone "${{ inputs.package_repo }}" /pkg
            PKG="${{ inputs.package_name }}"
            AUR_HEAD=$(git -C /pkg rev-parse HEAD)
            REUSE=0

            if [ -f "/prev/${PKG}.aur-hash" ] && [ "$(cat /prev/${PKG}.aur-hash)" = "$AUR_HEAD" ]; then
              PREV_PKG=$(ls /prev/${PKG}-*.pkg.tar.* 2>/dev/null | grep -v '\.sig$' | head -1)
              if [ -n "$PREV_PKG" ]; then
                DRIFT=0
                while IFS= read -r line; do
                  case "$line" in
                    "installed = "*)
                      ENTRY="${line#installed = }"
                      REST="${ENTRY%-*}"
                      REL="${REST##*-}"; REST="${REST%-*}"
                      VER="${REST##*-}"; NAME="${REST%-*}"
                      CUR=$(pacman -Si "$NAME" 2>/dev/null | awk -F': +' '/^Version/ {print $2; exit}')
                      if [ "$CUR" != "$VER-$REL" ]; then DRIFT=1; break; fi
                      ;;
                  esac
                done < <(bsdtar -xOf "$PREV_PKG" .BUILDINFO)
                if [ "$DRIFT" = "0" ]; then
                  cp /prev/${PKG}-*.pkg.tar.* /pkg/
                  echo "Reused previous build (AUR HEAD + BUILDINFO match)"
                  REUSE=1
                fi
              fi
            fi

            if [ "$REUSE" = "0" ]; then
              EXTRA_ARGS=""
              if [ "${{ inputs.skip_tests }}" = "true" ]; then
                EXTRA_ARGS="--nocheck"
              fi
              cd /pkg && makepkg -s --noconfirm --sign $EXTRA_ARGS
            fi
            echo "$AUR_HEAD" > "/pkg/${PKG}.aur-hash"

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: pkg-${{ inputs.package_name }}
          path: |
            pkg/*.pkg.tar.*
            pkg/*.aur-hash

      - name: Upload to release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            pkg/*.pkg.tar.* pkg/*.aur-hash \
            --repo "${{ github.repository }}"