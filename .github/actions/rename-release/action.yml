name: Rename a GitHub release
description: Rename a release by downloading its assets, deleting it, and recreating at a new tag with the same assets

inputs:
  from_tag:
    description: "Existing release tag to rename"
    required: true
  to_tag:
    description: "New tag name"
    required: true
  repo:
    description: "owner/repo"
    required: true
  token:
    description: "GitHub token with contents:write"
    required: true
  title:
    description: "Title for the renamed release (default: 'Packages <to_tag>')"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Rename release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        FROM: ${{ inputs.from_tag }}
        TO: ${{ inputs.to_tag }}
        REPO: ${{ inputs.repo }}
        TITLE: ${{ inputs.title }}
      run: |
        INFO=$(gh release view "$FROM" --repo "$REPO" --json body,targetCommitish)
        BODY=$(echo "$INFO" | jq -r .body)
        TARGET=$(echo "$INFO" | jq -r .targetCommitish)
        : "${TITLE:=Packages $TO}"
        DIR=$(mktemp -d)
        gh release download "$FROM" --repo "$REPO" --dir "$DIR" || true

        # Create and fully populate the destination FIRST; only delete the
        # source once it is safely in place. With `set -e`, a failure here
        # (e.g. a transient API 403) aborts the step before the source is
        # touched, so both releases survive and the job can simply be re-run.
        # The previous order deleted the source before creating the
        # destination, so a failed create permanently lost the only copy.
        gh release delete "$TO" --repo "$REPO" --yes 2>/dev/null || true
        gh api -X DELETE "repos/$REPO/git/refs/tags/$TO" 2>/dev/null || true
        gh release create "$TO" \
          --repo "$REPO" \
          --target "$TARGET" \
          --title "$TITLE" \
          --notes "$BODY"
        shopt -s nullglob
        files=("$DIR"/*)
        if [ ${#files[@]} -gt 0 ]; then
          gh release upload "$TO" --repo "$REPO" "${files[@]}"
        fi

        # Final safety check: never delete the source unless the destination is
        # confirmed to exist. With `set -e` this aborts the step before any
        # deletion if the create/upload above did not actually land.
        gh release view "$TO" --repo "$REPO" >/dev/null

        # Destination is created and populated — now it is safe to remove the source.
        gh release delete "$FROM" --repo "$REPO" --yes
        gh api -X DELETE "repos/$REPO/git/refs/tags/$FROM" 2>/dev/null || true
        rm -rf "$DIR"